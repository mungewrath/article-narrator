services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf
    container_name: article-audio-abs
    restart: unless-stopped
    ports:
      - "13378:80"
    volumes:
      - ./var/audiobookshelf/config:/config
      - ./var/audiobookshelf/metadata:/metadata
      - ./var/audiobookshelf/audiobooks:/audiobooks
      - ./var/audiobookshelf/podcasts:/podcasts
    environment:
      - TZ=America/Los_Angeles

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.12
    container_name: article-audio-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
    volumes:
      - ./docker/elasticmq/elasticmq.conf:/opt/elasticmq.conf
    command:
      - /opt/elasticmq.conf

  article-sqs-bridge:
    build:
      context: .
    container_name: article-sqs-bridge
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - ./config/article-sqs-bridge.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # TODO: Don't give access to the full AWS credentials folder, only a specific credentials file with limited permissions
    volumes:
      - ./var/jobs:/data/jobs
      - ~/.aws:/root/.aws:ro

  prefect-server:
    build:
      context: .
    container_name: article-audio-prefect-server
    restart: unless-stopped
    command:
      - prefect
      - server
      - start
      - --host
      - 0.0.0.0
      - --port
      - "4200"
    ports:
      - "4200:4200"
    environment:
      - PREFECT_HOME=/data/prefect
    volumes:
      - ./var/prefect:/data/prefect
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5)
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  prefect-bootstrap:
    build:
      context: .
    container_name: article-audio-prefect-bootstrap
    restart: "no"
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - ./config/prefect.env
    command:
      - /app/docker/prefect/bootstrap.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ./var/jobs:/data/jobs
      - ./var/audiobookshelf/podcasts:/podcasts
      # Prevents permission conflicts with the host .venv
      - venv_cache:/app/.venv

  prefect-worker:
    build:
      context: .
    container_name: article-audio-prefect-worker
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - ./config/prefect.env
    command:
      - prefect
      - worker
      - start
      - --pool
      - article-audio
      - --type
      - process
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ./var/jobs:/data/jobs
      - ./var/audiobookshelf/podcasts:/podcasts
      # Prevents permission conflicts with the host .venv
      - venv_cache:/app/.venv

volumes:
  venv_cache: